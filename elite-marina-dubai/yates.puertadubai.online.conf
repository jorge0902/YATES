server {
    listen 80;
    server_name yates.puertadubai.online;

    if ($host = yates.puertadubai.online) {
        return 301 https://$host$request_uri;
    }
    return 404;
}

server {
    listen 443 ssl;
    server_name yates.puertadubai.online;

    root /var/www/yates;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    ssl_certificate /etc/letsencrypt/live/yates.puertadubai.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yates.puertadubai.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
